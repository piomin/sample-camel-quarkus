quarkus.camel.openapi.expose.enabled=true

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:persondb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

quarkus.http.auth.permission.api.paths=/persons*
quarkus.http.auth.permission.api.policy=authenticated

%test.quarkus.oidc.enabled=false
%test.quarkus.http.auth.permission.api.policy=permit

quarkus.keycloak.devservices.port=8180

quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h "%r" %s %b %D ms

quarkus.swagger-ui.oauth-client-id=quarkus-app
quarkus.swagger-ui.oauth-client-secret=secret
quarkus.swagger-ui.oauth-use-pkce-with-authorization-code-grant=true